<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ZNote Mobile</title>

    <base href="/" />

    <meta name="color-scheme" content="light" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA 主题色（与 manifest.theme_color 一致，便于浏览器识别主题色） -->
    <meta name="theme-color" content="#FF6900" />

    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ZNote" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- iOS 添加到主屏幕图标（PNG 格式，iOS 不支持 webp） -->
    <link rel="apple-touch-icon" href="/icons/icon-192.webp" />
  </head>

  <body>
    <div id="app">
      <div id="app-loading">
        <img src="/icons/icon-192.webp" alt="ZNote" class="loading-logo" />
        <p class="loading-text">ZNote</p>
      </div>
      <style>
        #app-loading {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #F7F8FA;
          gap: 16px;
        }
        .loading-logo {
          width: 80px;
          height: 80px;
          border-radius: 20px;
          animation: pulse 1.5s ease-in-out infinite;
        }
        .loading-text {
          margin: 0;
          font-family: "MI Lan Pro", -apple-system, BlinkMacSystemFont,
            "PingFang SC", "Helvetica Neue", sans-serif;
          font-size: 18px;
          color: #1d2129;
          letter-spacing: 0.5px;
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.08); opacity: 0.7; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>

</html>
