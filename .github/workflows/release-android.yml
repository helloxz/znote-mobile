name: Release Android APK

# 当在 GitHub 上发布 Release 时触发，自动打包并签名 Android APK
on:
  release:
    types: [published]

# 同一 release 只跑一次，避免并发冲突
concurrency:
  group: release-android-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 读取发布版本号
        id: ver
        run: |
          # 从 release tag 提取版本号，去掉可选的 v 前缀
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          MAJOR="${MAJOR:-0}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
          # versionCode 转为递增整数：major*10000 + minor*100 + patch
          VC=$((MAJOR*10000 + MINOR*100 + PATCH))
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$VC" >> "$GITHUB_OUTPUT"

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2

      - name: 安装前端依赖
        run: bun install --frozen-lockfile

      - name: 构建前端 (产出 dist/)
        run: bun run build

      - name: 安装 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 生成并同步 Android 原生工程
        run: |
          # android/ 目录被 gitignore，CI 需用 cap 重新生成
          bunx cap add android
          bunx cap sync android
          # 用 resources/icon.png 生成所有 mipmap 尺寸的 launcher 图标
          bunx @capacitor/assets generate --android

      - name: 解码签名密钥
        run: |
          # keystore 以 base64 存储于 Secrets，解码到 app/ 目录
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          # 生成 key.properties（Properties 文件不允许行首空格，故用 printf）
          printf 'storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" "${{ secrets.KEY_ALIAS }}" "${{ secrets.KEY_PASSWORD }}" \
            > android/app/key.properties

      - name: 注入版本号与签名配置
        run: |
          cd android
          # 替换写死的 versionCode / versionName
          sed -i "s/versionCode 1/versionCode ${{ steps.ver.outputs.code }}/" app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ steps.ver.outputs.name }}\"/" app/build.gradle
          # 准备 signingConfigs 片段
          cat > /tmp/signing.txt <<'GRADLE'
          signingConfigs {
              release {
                  def props = new Properties()
                  def propsFile = file("key.properties")
                  if (propsFile.exists()) {
                      props.load(new FileInputStream(propsFile))
                      storeFile file(props['storeFile'])
                      storePassword props['storePassword']
                      keyAlias props['keyAlias']
                      keyPassword props['keyPassword']
                  }
              }
          }
          GRADLE
          # 先在 buildTypes 的 release { 后追加引用（先做，避免误匹配 signingConfigs.release）
          sed -i 's/^        release {/        release {\n            signingConfig signingConfigs.release/' app/build.gradle
          # 再在 android { 之后插入 signingConfigs 块
          sed -i '/^android {/r /tmp/signing.txt' app/build.gradle

      - name: 构建 release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          # 重命名为 znote-mobile-v{x.x.x}.apk
          cp app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/znote-mobile-v${{ steps.ver.outputs.name }}.apk"

      - name: 上传 APK 到当前 Release
        run: |
          APK="android/app/build/outputs/apk/release/znote-mobile-v${{ steps.ver.outputs.name }}.apk"
          gh release upload "${{ github.event.release.tag_name }}" "$APK" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 归档构建产物（备用下载）
        uses: actions/upload-artifact@v4
        with:
          name: znote-mobile-v${{ steps.ver.outputs.name }}-apk
          path: android/app/build/outputs/apk/release/znote-mobile-v${{ steps.ver.outputs.name }}.apk
